<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية المستقبل</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>أهلاً بك في أكاديمية المستقبل الرقمي</h1>
        <p>نصنع قادة التكنولوجيا عبر مناهج متطورة</p>
    </header>

    <section id="welcome-section">
        <input type="text" id="userName" placeholder="اكتب اسمك هنا...">
        <button onclick="sayHello()" class="btn-primary">ابدأ الآن</button>
        <h2 id="welcome-msg"></h2>
    </section>

    <script>
        function sayHello() {
            let name = document.getElementById("userName").value;
            if (name) {
                document.getElementById("welcome-msg").innerText = "مرحباً بك يا " + name + "، يسعدنا انضمامك إلينا!";
            }
        }
    </script>
</body>
</html>
